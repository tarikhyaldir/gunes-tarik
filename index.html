/* Dotted divider */
function DotDiv({my=16}){
  return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10,margin:`${my}px 0`}}>
      <div style={{flex:1,maxWidth:60,borderTop:`1.2px dotted ${P.blue}`,opacity:0.6}}/>
      <svg width="20" height="10" viewBox="0 0 20 10">
        <path d="M0 5 L6 2 L8 5 L6 8 Z" fill={P.blue} opacity="0.7"/>
        <circle cx="10" cy="5" r="1.5" fill={P.blue}/>
        <path d="M12 5 L14 2 L20 5 L14 8 Z" fill={P.blue} opacity="0.7"/>
      </svg>
      <div style={{flex:1,maxWidth:60,borderTop:`1.2px dotted ${P.blue}`,opacity:0.6}}/>
    </div>
  );
}

/* Countdown tile */
function Tile({v,l}){
  return(
    <div style={{flex:1,textAlign:"center"}}>
      <div style={{border:`1px solid ${P.blue}`,padding:"10px 4px 8px",background:"rgba(255,255,255,0.6)"}}>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:32,fontWeight:500,color:P.blueD,lineHeight:1}}>{String(v).padStart(2,"0")}</div>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:"0.22em",color:P.blue,marginTop:4,textTransform:"uppercase"}}>{l}</div>
      </div>
    </div>
  );
}

/* Calendar */
function CalButtons(){
  const gUrl=()=>{const p=new URLSearchParams({action:"TEMPLATE",text:`${ev.bride} & ${ev.groom} Düğünü`,dates:"20260516T160000Z/20260516T200000Z",details:"Viamor Deluxe",location:"Viamor Deluxe, Denizli"});return`https://calendar.google.com/calendar/render?${p}`;};
  const ics=()=>{const d=["BEGIN:VCALENDAR","VERSION:2.0","BEGIN:VEVENT","DTSTART:20260516T160000Z","DTEND:20260516T200000Z",`SUMMARY:${ev.bride} & ${ev.groom} Düğünü`,"LOCATION:Viamor Deluxe\\, Denizli","END:VEVENT","END:VCALENDAR"].join("\r\n");const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([d],{type:"text/calendar"}));a.download="gunes-tarik.ics";a.click();};
  const bs={display:"inline-flex",alignItems:"center",gap:6,padding:"9px 18px",border:`1px solid ${P.blue}`,background:"rgba(255,255,255,0.6)",fontFamily:"'Cinzel',serif",fontSize:10,letterSpacing:"0.18em",color:P.blueD,cursor:"pointer",textDecoration:"none",textTransform:"uppercase",fontWeight:500};
  return(
    <div style={{textAlign:"center"}}>
      <div style={{fontFamily:"'Cinzel',serif",fontSize:10,letterSpacing:"0.4em",color:P.blue,marginBottom:12,textTransform:"uppercase",fontWeight:500}}>Takvime Ekle</div>
      <div style={{display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap"}}>
        <a href={gUrl()} target="_blank" rel="noopener noreferrer" style={bs}>Google</a>
        <button onClick={ics} style={bs}>Apple / Outlook</button>
      </div>
    </div>
  );
}

function App(){
  const[view,sv]=useState("invitation");
  const[form,sf]=useState({name:"",attending:"yes",guests:1,note:""});
  const[cd,sc]=useState({days:0,hours:0,mins:0,secs:0});
  const[loaded,sl]=useState(false);
  const[sub,ss]=useState(false);
  const[prev,sp]=useState(null);
  const[wasUpd,swu]=useState(false);
  const[adIn,sai]=useState("");
  const[adOk,sao]=useState(false);

  useEffect(()=>{
    const lk=document.createElement("link");lk.rel="stylesheet";
    lk.href="https://fonts.googleapis.com/css2?family=Allura&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Cinzel:wght@400;500;600&family=Lato:wght@300;400&display=swap";
    document.head.appendChild(lk);
    setTimeout(()=>sl(true),200);
    try{const s=localStorage.getItem(STORE_KEY);if(s){const p=JSON.parse(s);sp(p);sf(p);}}catch{}
  },[]);

  useEffect(()=>{
    const t=()=>{const d=ev.target-new Date();if(d<=0){sc({days:0,hours:0,mins:0,secs:0});return;}sc({days:Math.floor(d/86400000),hours:Math.floor((d%86400000)/3600000),mins:Math.floor((d%3600000)/60000),secs:Math.floor((d%60000)/1000)});};
    t();const id=setInterval(t,1000);return()=>clearInterval(id);
  },[]);

  const submit=async()=>{
    if(!form.name.trim())return;swu(!!prev);ss(true);
    try{await fetch(SHEET_URL,{method:"POST",mode:"no-cors",body:JSON.stringify({name:form.name,attending:form.attending,guests:form.attending==="yes"?form.guests:"-",note:form.note||""})});
    localStorage.setItem(STORE_KEY,JSON.stringify(form));sp(form);}catch{}
    ss(false);sv("confirmation");
  };

  if(!loaded)return null;

  const outerBg={minHeight:"100vh",background:P.bg,padding:"20px 16px",fontFamily:"'Lato',sans-serif"};

  /* ══ INVITATION ══ */
  if(view==="invitation")return(
    <div style={outerBg}>
      <style>{`
        @keyframes fuI{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
        .iA1{animation:fuI 1.2s 0.1s both}.iA2{animation:fuI 1.2s 0.3s both}.iA3{animation:fuI 1.2s 0.5s both}.iA4{animation:fuI 1.2s 0.7s both}.iA5{animation:fuI 1.2s 0.9s both}
        input::placeholder,textarea::placeholder{color:${P.muted};opacity:0.7}
        select option{background:#FFF;color:${P.text}}
      `}</style>

      <div style={{maxWidth:500,margin:"0 auto"}}>
        {/* Background invitation image card */}
        <div className="iA1" style={{
          position:"relative",aspectRatio:"850/1200",
          backgroundImage:`url(${BG_URL})`,
          backgroundSize:"cover",backgroundPosition:"center",
          boxShadow:"0 12px 40px rgba(0,0,0,0.2)",
        }}>
          {/* Overlay with our text on top of the image */}
          <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",padding:"9% 14% 8%"}}>
            {/* Top text */}
            <div style={{textAlign:"center",marginTop:"4%"}}>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:"clamp(10px,2.6vw,13px)",letterSpacing:"0.18em",color:P.blueD,lineHeight:1.9,fontWeight:500}}>
                SİZİ EN ÖZEL GÜNÜMÜZDE<br/>
                ARAMIZDA GÖRMEKTEN<br/>
                ONUR DUYACAĞIZ
              </div>
            </div>

            {/* Names */}
            <div style={{textAlign:"center",marginTop:"5%",marginBottom:"3%"}}>
              <div style={{fontFamily:"'Allura',cursive",fontSize:"clamp(58px,15vw,100px)",color:P.sageD,lineHeight:1.05,paddingTop:8,paddingBottom:6}}>{ev.bride}</div>
              <div style={{fontFamily:"'Allura',cursive",fontSize:"clamp(52px,13vw,86px)",color:P.sageD,lineHeight:1.05,marginTop:"-4%"}}>&amp; {ev.groom}</div>
            </div>

            {/* Spacer for gazebo */}
            <div style={{flex:"0 0 18%"}}/>

            {/* Date */}
            <div style={{textAlign:"center",marginTop:"3%"}}>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:"clamp(10px,2.6vw,12px)",letterSpacing:"0.2em",color:P.blueD,fontWeight:500,lineHeight:1.7}}>
                {ev.dateLong}<br/>{ev.venueFull}
              </div>
            </div>

            {/* Divider */}
            <div style={{display:"flex",justifyContent:"center",margin:"3% 0"}}>
              <svg width="60" height="10" viewBox="0 0 60 10">
                <line x1="0" y1="5" x2="22" y2="5" stroke={P.blue} strokeWidth="0.8"/>
                <path d="M22 5 L28 2 L30 5 L28 8 Z" fill={P.blue}/>
                <path d="M30 5 L32 2 L38 5 L32 8 Z" fill={P.blue}/>
                <line x1="38" y1="5" x2="60" y2="5" stroke={P.blue} strokeWidth="0.8"/>

            {/* Families */}

          </div>
        </div>

        <div className="iA3" style={{marginTop:16}}>

                {ev.times.map((t,i)=>(
                  <div key={i} style={{flex:1,textAlign:"center",padding:"12px 4px",borderLeft:i>0?`1px solid ${P.blue}`:"none"}}>
                    <div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.2em",color:P.blue,textTransform:"uppercase",marginBottom:6,fontWeight:500}}>{t.l}</div>
                    <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontWeight:500,color:P.blueD}}>{t.t}</div>
                  </div>
                ))}
              </div>
            </div>

            <DotDiv/>

            {/* Venue */}
            <div style={{textAlign:"center",padding:"12px 20px"}}>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:10,letterSpacing:"0.45em",color:P.blue,textTransform:"uppercase",marginBottom:10,fontWeight:500}}>Konum</div>
              <div style={{fontFamily:"'Allura',cursive",fontSize:44,color:P.sageD,lineHeight:1.3,paddingTop:4}}>{ev.venue}</div>
              <a href={ev.map} target="_blank" rel="noopener noreferrer" style={{display:"inline-flex",alignItems:"center",gap:6,marginTop:12,padding:"9px 22px",border:`1px solid ${P.blue}`,background:"rgba(255,255,255,0.6)",fontFamily:"'Cinzel',serif",fontSize:10.5,letterSpacing:"0.2em",color:P.blueD,textDecoration:"none",textTransform:"uppercase",fontWeight:500}}>
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" stroke={P.blueD} strokeWidth="1.5" fill="rgba(78,100,133,0.2)"/><circle cx="12" cy="9" r="2.5" stroke={P.blueD} strokeWidth="1.2"/></svg>
                Yol Tarifi
              </a>
            </div>

            <DotDiv/>

            {/* Countdown */}
            <div style={{padding:"12px 20px"}}>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:10,letterSpacing:"0.4em",color:P.blue,textAlign:"center",marginBottom:12,textTransform:"uppercase",fontWeight:500}}>Düğüne Kalan</div>
              <div style={{display:"flex",gap:6}}><Tile v={cd.days} l="Gün"/><Tile v={cd.hours} l="Saat"/><Tile v={cd.mins} l="Dak"/><Tile v={cd.secs} l="Sn"/></div>
            </div>

            <DotDiv/>

            {/* Calendar */}
            <div style={{padding:"10px 20px"}}><CalButtons/></div>

            <DotDiv/>

            {/* RSVP */}
            <div style={{textAlign:"center",padding:"12px 20px 8px"}}>
              {prev&&<div style={{fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic",fontSize:14,color:P.blue,marginBottom:12}}><span style={{color:P.blueD,fontWeight:500}}>{prev.name}</span> olarak bildiriminiz alındı.</div>}
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic",fontSize:16,color:P.blueD,lineHeight:1.8,marginBottom:18}}>
                Katılım durumunuzu en kısa sürede<br/>bildirmenizi rica ederiz.
              </div>
              <button style={btnG} onClick={()=>sv("rsvp")}>{prev?"Bildirimimi Güncelle":"Katılım Bildir"}</button>
              <div style={{marginTop:14}}>
                <button style={{background:"none",border:"none",color:P.blue,cursor:"pointer",fontSize:12,letterSpacing:"0.2em",opacity:0.5}} onClick={()=>sv("admin")}>···</button>
              </div>
            </div>
          </DecoFrame>
        </div>
      </div>
    </div>
  );

  /* ══ RSVP ══ */
  if(view==="rsvp")return(
    <div style={outerBg}>
      <style>{`input::placeholder,textarea::placeholder{color:${P.muted};opacity:0.7}select option{background:#FFF;color:${P.text}}`}</style>
      <div style={{maxWidth:440,margin:"0 auto"}}>
        <DecoFrame>
          <div style={{textAlign:"center",marginBottom:22,paddingTop:8}}>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:10,letterSpacing:"0.45em",color:P.blue,textTransform:"uppercase",marginBottom:10,fontWeight:500}}>{prev?"Bildirim Güncelle":"Katılım Bildirimi"}</div>
            <div style={{fontFamily:"'Allura',cursive",fontSize:44,color:P.sageD,lineHeight:1.3,paddingTop:4}}>{ev.bride} &amp; {ev.groom}</div>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:10,color:P.blue,marginTop:6,letterSpacing:"0.22em",fontWeight:500}}>{ev.dateS}</div>
          </div>
          <DotDiv my={0}/>
          <div style={{display:"flex",flexDirection:"column",gap:16,marginTop:22,padding:"0 20px"}}>
            <FI label="Ad Soyad *" value={form.name} onChange={e=>sf({...form,name:e.target.value})} placeholder="Adınız ve soyadınız"/>
            <div>
              <label style={lb}>Katılım *</label>
              <div style={{display:"flex",gap:8}}>
                {[{v:"yes",l:"Evet, Gelirim"},{v:"no",l:"Gelemiyorum"}].map(o=>(
                  <div key={o.v} onClick={()=>sf({...form,attending:o.v})} style={{flex:1,textAlign:"center",padding:"13px 8px",cursor:"pointer",border:`1.5px solid ${form.attending===o.v?P.blue:P.blueL}`,background:form.attending===o.v?`rgba(78,100,133,0.15)`:"rgba(255,255,255,0.6)",color:form.attending===o.v?P.blueD:P.blue,fontFamily:"'Cinzel',serif",fontSize:10.5,letterSpacing:"0.1em",transition:"all 0.2s",textTransform:"uppercase",fontWeight:500}}>{o.l}</div>
                ))}
              </div>
            </div>
            {form.attending==="yes"&&<div><label style={lb}>Kaç Kişi?</label><select style={{...mkI(false),cursor:"pointer",appearance:"none"}} value={form.guests} onChange={e=>sf({...form,guests:e.target.value})}>{[1,2,3,4,5].map(n=><option key={n} value={n}>{n} kişi</option>)}</select></div>}
            <FTA label="Not (isteğe bağlı)" value={form.note} onChange={e=>sf({...form,note:e.target.value})} placeholder="Eklemek istediğiniz bir şey..."/>
            <div style={{display:"flex",gap:10,marginTop:6,marginBottom:12}}>
              <button style={btnS} onClick={()=>sv("invitation")}>Geri</button>
              <button style={{...btnG,flex:1,opacity:form.name.trim()?1:0.5}} onClick={submit}>{sub?"Gönderiliyor...":"Gönder"}</button>
            </div>
          </div>
        </DecoFrame>
      </div>
    </div>
  );

  /* ══ CONFIRMATION ══ */
  if(view==="confirmation")return(
    <div style={{...outerBg,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{maxWidth:400,width:"100%"}}>
        <DecoFrame>
          <div style={{textAlign:"center",padding:"12px 20px"}}>
            <div style={{fontFamily:"'Allura',cursive",fontSize:54,color:P.sageD,lineHeight:1.2,paddingTop:6}}>{form.attending==="yes"?"Teşekkürler":"Anlıyoruz"}</div>
            <DotDiv/>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,color:P.blueD,margin:"14px 0 10px",fontWeight:500}}>{form.name}</div>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic",fontSize:15,color:P.blueD,lineHeight:1.9,marginBottom:26}}>
              {form.attending==="yes"?`${wasUpd?"Bildiriminiz güncellendi.":"Yanıtınız alındı."} ${ev.dateD} günü sizi aramızda görmekten büyük mutluluk duyacağız.`:`${wasUpd?"Bildiriminiz güncellendi.":"Yanıtınız alındı."} Umarız başka özel günlerde bir arada oluruz.`}
            </div>
            <button style={btnG} onClick={()=>sv("invitation")}>Daveti Görüntüle</button>
          </div>
        </DecoFrame>
      </div>
    </div>
  );

  /* ══ ADMIN ══ */
  if(view==="admin")return(
    <div style={outerBg}>
      <style>{`input::placeholder{color:${P.muted};opacity:0.7}`}</style>
      <div style={{maxWidth:480,margin:"0 auto"}}>
        <DecoFrame>
          <div style={{textAlign:"center",marginBottom:20,paddingTop:8}}>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:10,letterSpacing:"0.45em",color:P.blue,textTransform:"uppercase",marginBottom:10,fontWeight:500}}>Misafir Listesi</div>
            <div style={{fontFamily:"'Allura',cursive",fontSize:38,color:P.sageD,paddingTop:4}}>{ev.bride} &amp; {ev.groom}</div>
          </div>
          <DotDiv my={0}/>
          <div style={{padding:"0 20px"}}>
            {!adOk?(
              <div style={{textAlign:"center",marginTop:24}}>
                <div style={{fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic",fontSize:15,color:P.blueD,marginBottom:18}}>Bu sayfayı görüntülemek için şifre gereklidir.</div>
                <input type="password" style={{...mkI(false),maxWidth:220,margin:"0 auto 14px",textAlign:"center",display:"block"}} value={adIn} onChange={e=>sai(e.target.value)} placeholder="Şifre" onKeyDown={e=>e.key==="Enter"&&adIn==="gt2026"&&sao(true)}/>
                <button style={btnG} onClick={()=>adIn==="gt2026"&&sao(true)}>Giriş</button>
                <br/><button style={{...btnS,marginTop:12}} onClick={()=>sv("invitation")}>Geri</button>
                <div style={{fontSize:9,color:P.blue,marginTop:12,opacity:0.6}}>Şifre: gt2026</div>
              </div>
            ):(
              <>
                <div style={{textAlign:"center",padding:"24px 0 16px"}}>
                  <div style={{fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic",fontSize:15,color:P.blueD,lineHeight:1.8,marginBottom:20}}>Tüm katılım bildirimleri Google Sheets tablonuza kaydediliyor.</div>
                  <a href="https://docs.google.com/spreadsheets" target="_blank" rel="noopener noreferrer" style={{display:"inline-flex",alignItems:"center",gap:8,...btnG,textDecoration:"none"}}>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" stroke="#FDF6E8" strokeWidth="1.5"/><line x1="3" y1="9" x2="21" y2="9" stroke="#FDF6E8" strokeWidth="1.5"/><line x1="3" y1="15" x2="21" y2="15" stroke="#FDF6E8" strokeWidth="1.5"/><line x1="9" y1="9" x2="9" y2="21" stroke="#FDF6E8" strokeWidth="1.5"/></svg>
                    Google Sheets Aç
                  </a>
                </div>
                <div style={{textAlign:"center",marginTop:8,paddingBottom:10}}><button style={btnS} onClick={()=>sv("invitation")}>Davete Dön</button></div>
              </>
            )}
          </div>
        </DecoFrame>
      </div>
    </div>
  );

  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
