/* ══ Sparkles canvas ══ */
function Sparkles(){
  const r=useRef();
  useEffect(()=>{
    const c=r.current;if(!c)return;
    const ctx=c.getContext("2d");
    c.width=c.offsetWidth;c.height=c.offsetHeight;
    const pts=Array.from({length:50},()=>({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.6+0.2,ph:Math.random()*6.28,sp:Math.random()*.004+.001,dx:(Math.random()-.5)*.1,dy:-(Math.random()*.16+.04)}));
    let fr;
    const draw=()=>{
      ctx.clearRect(0,0,c.width,c.height);
      pts.forEach(p=>{
        p.ph+=p.sp;p.x+=p.dx;p.y+=p.dy;
        if(p.y<-4){p.y=c.height+4;p.x=Math.random()*c.width;}
        if(p.x<-4)p.x=c.width+4;if(p.x>c.width+4)p.x=-4;
        const op=(Math.sin(p.ph)*.5+.5)*.7+.1;
        ctx.save();ctx.globalAlpha=op;ctx.translate(p.x,p.y);ctx.rotate(p.ph);
        const g=ctx.createRadialGradient(0,0,0,0,0,p.r);
        g.addColorStop(0,"#F8E8A0");g.addColorStop(1,"#C8900A");
        ctx.fillStyle=g;ctx.beginPath();
        for(let i=0;i<8;i++){const a=i*Math.PI/4,rv=i%2===0?p.r:p.r*.3;i===0?ctx.moveTo(Math.cos(a)*rv,Math.sin(a)*rv):ctx.lineTo(Math.cos(a)*rv,Math.sin(a)*rv);}
        ctx.closePath();ctx.fill();ctx.restore();
      });
      fr=requestAnimationFrame(draw);
    };
    draw();return()=>cancelAnimationFrame(fr);
  },[]);
  return <canvas ref={r} style={{position:"absolute",inset:0,width:"100%",height:"100%",pointerEvents:"none"}}/>;
}

      </div>
      {/* Decorative bottom */}
      <svg style={{position:"absolute",bottom:0,left:0,right:0,width:"100%",height:80,pointerEvents:"none",opacity:0.2}} viewBox="0 0 400 80">
        <path d="M0 40 Q100 10 200 40 Q300 70 400 40" stroke="#C8900A" strokeWidth="1" fill="none"/>
        <circle cx="200" cy="40" r="5" fill="#E0B840"/>
        <circle cx="100" cy="25" r="3" fill="#C8900A" opacity="0.6"/>
        <circle cx="300" cy="55" r="3" fill="#C8900A" opacity="0.6"/>
      </svg>
    </div>
  );
}

/* ══ Main App ══ */
function App(){
  const[view,sv]=useState("envelope");
  const[form,sf]=useState({name:"",attending:"yes",guests:1,note:""});
  const[cd,sc]=useState({days:0,hours:0,mins:0,secs:0});
  const[loaded,sl]=useState(false);
  const[sub,ss]=useState(false);
  const[prev,sp]=useState(null);
  const[wasUpd,swu]=useState(false);
  const[adIn,sai]=useState("");
  const[adOk,sao]=useState(false);

  useEffect(()=>{
    const lk=document.createElement("link");lk.rel="stylesheet";
    lk.href="https://fonts.googleapis.com/css2?family=Parisienne&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Cinzel:wght@400;500&family=Lato:wght@300;400&display=swap";
    document.head.appendChild(lk);
    setTimeout(()=>sl(true),200);
    try{const s=localStorage.getItem(STORE_KEY);if(s){const p=JSON.parse(s);sp(p);sf(p);}}catch{}
  },[]);

  useEffect(()=>{
    const t=()=>{const d=ev.target-new Date();if(d<=0){sc({days:0,hours:0,mins:0,secs:0});return;}sc({days:Math.floor(d/86400000),hours:Math.floor((d%86400000)/3600000),mins:Math.floor((d%3600000)/60000),secs:Math.floor((d%60000)/1000)});};
    t();const id=setInterval(t,1000);return()=>clearInterval(id);
  },[]);

  const submit=async()=>{
    if(!form.name.trim())return;
    swu(!!prev);ss(true);
    try{await fetch(SHEET_URL,{method:"POST",mode:"no-cors",body:JSON.stringify({name:form.name,attending:form.attending,guests:form.attending==="yes"?form.guests:"-",note:form.note||""})});
    localStorage.setItem(STORE_KEY,JSON.stringify(form));sp(form);}catch{}
    ss(false);sv("confirmation");
  };

  if(!loaded)return null;

  const bg={minHeight:"100vh",background:"#1A0E08",color:"#F2E8D5",fontFamily:"'Lato',sans-serif"};
  const cardSt={position:"relative",background:"linear-gradient(170deg,#1E1208,#160C06)",border:"1px solid #3A2808",boxShadow:"0 12px 80px rgba(200,144,10,0.12),0 4px 20px rgba(200,144,10,0.08)"};

  /* ── INVITATION ── */
  if(view==="invitation")return(
    <div style={bg}>
      <style>{`@keyframes shimmerG{0%{background-position:200% center}100%{background-position:-200% center}}@keyframes fuI{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}.i1{animation:fuI 1s 0.05s both}.i2{animation:fuI 1s 0.15s both}.i3{animation:fuI 1s 0.25s both}.i4{animation:fuI 1s 0.35s both}.i5{animation:fuI 1s 0.45s both}.i6{animation:fuI 1s 0.55s both}.i7{animation:fuI 1s 0.65s both}.i8{animation:fuI 1s 0.75s both}.i9{animation:fuI 1s 0.85s both}.i10{animation:fuI 1s 0.95s both}input::placeholder,textarea::placeholder{color:#4A3020;opacity:1}select option{background:#1A0E08;color:#F2E8D5}`}</style>
      <div style={{position:"fixed",inset:0,pointerEvents:"none"}}><Sparkles/></div>
      <div style={{maxWidth:490,margin:"0 auto",padding:"28px 14px 56px",position:"relative"}}>
        <div style={{...cardSt,padding:"52px 36px 48px"}}>
          <OrnateFrame/>
          <div style={{position:"absolute",inset:22,border:"0.5px solid #3A2808",opacity:0.4,pointerEvents:"none"}}/>

          {/* Header */}
          <div className="i1" style={{textAlign:"center",marginBottom:18}}>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.8em",color:"#7A5830",textTransform:"uppercase"}}>
              — Davetlisiniz —
            </div>
          </div>

          <ODiv my={0}/>

          {/* Opening */}
          <div className="i2" style={{textAlign:"center",margin:"22px 0",fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic",fontSize:16,color:"#8A7050",lineHeight:1.9}}>
            Bu anlamlı günümüzde sizleri de<br/>aramızda görmekten büyük onur duyacağız.
          </div>

          <ODiv/>

          {/* Names */}
          <div className="i3" style={{textAlign:"center",margin:"24px 0 12px"}}>
            <SName text={ev.bride} size={82}/>
            <div style={{margin:"4px 0"}}>
              <svg width="120" height="24" viewBox="0 0 120 24">
                <line x1="0" y1="12" x2="44" y2="12" stroke="#5A3A10" strokeWidth="0.6"/>
                <path d="M48 12 Q55 5 60 12 Q55 19 48 12Z" fill="#C8900A" opacity="0.8"/>
                <circle cx="60" cy="12" r="0" fill="#E0B840"/>
                <path d="M60 12 Q67 5 72 12 Q67 19 60 12Z" fill="#C8900A" opacity="0.8"/>
                <line x1="76" y1="12" x2="120" y2="12" stroke="#5A3A10" strokeWidth="0.6"/>
              </svg>
            </div>
            <SName text={ev.groom} size={82}/>
          </div>

          {/* Date */}
          <div className="i3" style={{textAlign:"center",marginBottom:24}}>
            <div style={{display:"inline-flex",alignItems:"center",gap:12,padding:"8px 24px",border:"1px solid #3A2808",background:"rgba(200,144,10,0.06)"}}>
              <svg width="8" height="8" viewBox="0 0 8 8"><circle cx="4" cy="4" r="3" fill="none" stroke="#C8900A" strokeWidth="0.8"/><circle cx="4" cy="4" r="1.5" fill="#C8900A"/></svg>
              <span style={{fontFamily:"'Cinzel',serif",fontSize:13,letterSpacing:"0.3em",color:"#D4A030"}}>{ev.dateS}</span>
              <svg width="8" height="8" viewBox="0 0 8 8"><circle cx="4" cy="4" r="3" fill="none" stroke="#C8900A" strokeWidth="0.8"/><circle cx="4" cy="4" r="1.5" fill="#C8900A"/></svg>
            </div>
          </div>

          <ODiv/>

          {/* Families */}
          <div className="i4" style={{display:"flex",margin:"22px 0",gap:0}}>
            {[ev.bf,ev.gf].map((f,i)=>(
              <div key={i} style={{flex:1,textAlign:"center",padding:"0 8px",borderLeft:i===1?"0.5px solid #3A2808":"none"}}>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:9.5,letterSpacing:"0.1em",color:"#7A5830",textTransform:"uppercase",lineHeight:1.9}}>{f.n}</div>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:12,letterSpacing:"0.15em",color:"#D4A030",textTransform:"uppercase",fontWeight:500}}>{f.s}</div>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:"0.2em",color:"#5A3A10",textTransform:"uppercase",marginTop:2}}>AİLESİ</div>
              </div>
            ))}
          </div>

          <ODiv/>

          {/* Programme */}
          <div className="i5" style={{margin:"22px 0"}}>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.55em",color:"#5A3A10",textAlign:"center",marginBottom:16,textTransform:"uppercase"}}>
              Program
            </div>
            <div style={{display:"flex",border:"1px solid #3A2808",background:"rgba(200,144,10,0.04)"}}>
              {ev.times.map((t,i)=>(
                <div key={i} style={{flex:1,textAlign:"center",padding:"16px 4px",borderLeft:i>0?"0.5px solid #3A2808":"none"}}>
                  <div style={{fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:"0.2em",color:"#7A5830",textTransform:"uppercase",marginBottom:8}}>{t.l}</div>
                  <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:28,fontWeight:300,color:"#E8D8B0"}}>{t.t}</div>
                </div>
              ))}
            </div>
          </div>

          <ODiv/>

          {/* Venue */}
          <div className="i6" style={{textAlign:"center",padding:"20px 0"}}>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.5em",color:"#5A3A10",textTransform:"uppercase",marginBottom:10}}>Konum</div>
            <div style={{fontFamily:"'Parisienne',cursive",fontSize:46,lineHeight:1.35,
              background:"linear-gradient(105deg,#C8900A,#F8E8A0,#C8900A)",backgroundSize:"200% auto",
              WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text",
              animation:"shimmerG 4s linear infinite"}}>{ev.venue}</div>
            <a href={ev.map} target="_blank" rel="noopener noreferrer" style={{display:"inline-flex",alignItems:"center",gap:7,marginTop:14,padding:"10px 24px",border:"1px solid #3A2808",background:"rgba(200,144,10,0.07)",fontFamily:"'Cinzel',serif",fontSize:10,letterSpacing:"0.2em",color:"#D4A030",textDecoration:"none",textTransform:"uppercase"}}>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" stroke="#D4A030" strokeWidth="1.5" fill="rgba(200,144,10,0.2)"/><circle cx="12" cy="9" r="2.5" stroke="#D4A030" strokeWidth="1.2"/></svg>
              Yol Tarifi Al
            </a>
          </div>

          <ODiv/>

          {/* Countdown */}
          <div className="i7" style={{padding:"16px 0"}}>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.45em",color:"#5A3A10",textAlign:"center",marginBottom:14,textTransform:"uppercase"}}>Düğüne Kalan</div>
            <div style={{display:"flex",gap:8}}><Tile v={cd.days} l="Gün"/><Tile v={cd.hours} l="Saat"/><Tile v={cd.mins} l="Dak"/><Tile v={cd.secs} l="Sn"/></div>
          </div>

          <ODiv/>

          {/* Calendar */}
          <div className="i8" style={{padding:"14px 0"}}><CalButtons/></div>

          <ODiv/>

          {/* RSVP */}
          <div className="i9" style={{textAlign:"center",padding:"20px 0 8px"}}>
            {prev&&<div style={{fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic",fontSize:14,color:"#8A7050",marginBottom:14}}><span style={{color:"#D4A030"}}>{prev.name}</span> olarak bildiriminiz alındı.</div>}
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic",fontSize:16,color:"#8A7050",lineHeight:1.9,marginBottom:22}}>
              Katılım durumunuzu en kısa sürede<br/>bildirmenizi rica ederiz.
            </div>
            <button style={btnG} onClick={()=>sv("rsvp")}>{prev?"Bildirimimi Güncelle":"Katılım Bildir"}</button>
            <div style={{marginTop:16}}>
              <button style={{background:"none",border:"none",color:"#3A2808",cursor:"pointer",fontSize:12,letterSpacing:"0.2em",opacity:0.5}} onClick={()=>sv("admin")}>···</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );

  /* ── RSVP ── */
  if(view==="rsvp")return(
    <div style={bg}>
      <div style={{maxWidth:440,margin:"0 auto",padding:"36px 14px 56px"}}>
        <div style={{...cardSt,padding:"40px 28px"}}>
          <OrnateFrame/>
          <div style={{textAlign:"center",marginBottom:22}}>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.45em",color:"#7A5830",textTransform:"uppercase",marginBottom:12}}>{prev?"Bildirim Güncelle":"Katılım Bildirimi"}</div>
            <SName text={`${ev.bride} & ${ev.groom}`} size={40}/>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:10,color:"#7A5830",marginTop:6,letterSpacing:"0.2em"}}>{ev.dateS}</div>
          </div>
          <ODiv my={0}/>
          <div style={{display:"flex",flexDirection:"column",gap:16,marginTop:22}}>
            <FI label="Ad Soyad *" value={form.name} onChange={e=>sf({...form,name:e.target.value})} placeholder="Adınız ve soyadınız"/>
            <div>
              <label style={lb}>Katılım *</label>
              <div style={{display:"flex",gap:8}}>
                {[{v:"yes",l:"Evet, Gelirim"},{v:"no",l:"Gelemiyorum"}].map(o=>(
                  <div key={o.v} onClick={()=>sf({...form,attending:o.v})} style={{flex:1,textAlign:"center",padding:"13px 8px",cursor:"pointer",border:`1px solid ${form.attending===o.v?"#C8900A":"#3A2808"}`,background:form.attending===o.v?"rgba(200,144,10,0.12)":"transparent",color:form.attending===o.v?"#D4A030":"#7A5830",fontFamily:"'Cinzel',serif",fontSize:10.5,letterSpacing:"0.1em",transition:"all 0.2s",textTransform:"uppercase",boxShadow:form.attending===o.v?"0 0 14px rgba(200,144,10,0.25)":"none"}}>{o.l}</div>
                ))}
              </div>
            </div>
            {form.attending==="yes"&&<div><label style={lb}>Kaç Kişi?</label><select style={{...mkI(false),cursor:"pointer",appearance:"none"}} value={form.guests} onChange={e=>sf({...form,guests:e.target.value})}>{[1,2,3,4,5].map(n=><option key={n} value={n}>{n} kişi</option>)}</select></div>}
            <FTA label="Not (isteğe bağlı)" value={form.note} onChange={e=>sf({...form,note:e.target.value})} placeholder="Eklemek istediğiniz bir şey..."/>
            <div style={{display:"flex",gap:10,marginTop:6}}>
              <button style={btnS} onClick={()=>sv("invitation")}>Geri</button>
              <button style={{...btnG,flex:1,opacity:form.name.trim()?1:0.5}} onClick={submit}>{sub?"Gönderiliyor...":"Gönder"}</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );

  /* ── CONFIRMATION ── */
  if(view==="confirmation")return(
    <div style={{...bg,display:"flex",alignItems:"center",justifyContent:"center",padding:"20px"}}>
      <div style={{maxWidth:400,width:"100%",...cardSt,padding:"52px 32px",textAlign:"center"}}>
        <OrnateFrame/>
        <SName text={form.attending==="yes"?"Teşekkürler":"Anlıyoruz"} size={48}/>
        <ODiv/>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,color:"#E8D8B0",margin:"16px 0 10px"}}>{form.name}</div>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic",fontSize:15,color:"#8A7050",lineHeight:1.9,marginBottom:32}}>
          {form.attending==="yes"?`${wasUpd?"Bildiriminiz güncellendi.":"Yanıtınız alındı."} ${ev.dateD} günü sizi aramızda görmekten büyük mutluluk duyacağız.`:`${wasUpd?"Bildiriminiz güncellendi.":"Yanıtınız alındı."} Umarız başka özel günlerde bir arada oluruz.`}
        </div>
        <button style={btnG} onClick={()=>sv("invitation")}>Daveti Görüntüle</button>
      </div>
    </div>
  );

  /* ── ADMIN ── */
  if(view==="admin")return(
    <div style={bg}>
      <div style={{maxWidth:480,margin:"0 auto",padding:"36px 14px 56px"}}>
        <div style={{...cardSt,padding:"36px 28px"}}>
          <OrnateFrame/>
          <div style={{textAlign:"center",marginBottom:20}}>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.45em",color:"#7A5830",textTransform:"uppercase",marginBottom:10}}>Misafir Listesi</div>
            <SName text={`${ev.bride} & ${ev.groom}`} size={34}/>
          </div>
          <ODiv my={0}/>
          {!adOk?(
            <div style={{textAlign:"center",marginTop:28}}>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic",fontSize:15,color:"#8A7050",marginBottom:20}}>Bu sayfayı görüntülemek için şifre gereklidir.</div>
              <input type="password" style={{...mkI(false),maxWidth:220,margin:"0 auto 14px",textAlign:"center",display:"block"}} value={adIn} onChange={e=>sai(e.target.value)} placeholder="Şifre" onKeyDown={e=>e.key==="Enter"&&adIn==="gt2026"&&sao(true)}/>
              <button style={btnG} onClick={()=>adIn==="gt2026"&&sao(true)}>Giriş</button>
              <br/><button style={{...btnS,marginTop:12}} onClick={()=>sv("invitation")}>Geri</button>
              <div style={{fontSize:9,color:"#4A3020",marginTop:12,opacity:0.5}}>Şifre: gt2026</div>
            </div>
          ):(
            <>
              <div style={{textAlign:"center",padding:"28px 0 20px"}}>
                <div style={{fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic",fontSize:15,color:"#8A7050",lineHeight:1.8,marginBottom:24}}>Tüm katılım bildirimleri Google Sheets tablonuza kaydediliyor.</div>
                <a href="https://docs.google.com/spreadsheets" target="_blank" rel="noopener noreferrer" style={{display:"inline-flex",alignItems:"center",gap:8,...btnG,textDecoration:"none"}}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" stroke="#1A0E04" strokeWidth="1.5"/><line x1="3" y1="9" x2="21" y2="9" stroke="#1A0E04" strokeWidth="1.5"/><line x1="3" y1="15" x2="21" y2="15" stroke="#1A0E04" strokeWidth="1.5"/><line x1="9" y1="9" x2="9" y2="21" stroke="#1A0E04" strokeWidth="1.5"/></svg>
                  Google Sheets Aç
                </a>
              </div>
              <div style={{textAlign:"center",marginTop:8}}><button style={btnS} onClick={()=>sv("invitation")}>Davete Dön</button></div>
            </>
          )}
        </div>
      </div>
    </div>
  );

  return <Envelope onOpen={()=>sv("invitation")}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
